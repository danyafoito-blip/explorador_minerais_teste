<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Oil and Gas Occurrences Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #f4f7f6;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #map {
            flex: 3;
            height: 100%;
            background-color: #e5e3df;
        }

        #side-panel {
            flex: 1;
            background: white;
            padding: 20px;
            overflow-y: auto;
            box-shadow: -2px 0 5px rgba(0,0,0,0.1);
            min-width: 300px;
            border-left: 1px solid #ddd;
        }

        .panel-placeholder {
            color: #7f8c8d;
            font-style: italic;
            text-align: center;
            margin-top: 50px;
        }

        .info-group {
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .info-label {
            font-weight: bold;
            color: #34495e;
            font-size: 0.85em;
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .info-value {
            color: #2c3e50;
            font-size: 1em;
            line-height: 1.4;
        }

        .tag {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            color: white;
            font-size: 0.8em;
            font-weight: bold;
            margin-top: 5px;
        }
        
        /* Legend Styles */
        .legend {
            background: white;
            padding: 10px;
            line-height: 1.5em;
            color: #333;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border-radius: 5px;
            font-size: 0.85em;
            max-height: 300px;
            overflow-y: auto;
        }
        .legend i {
            width: 12px;
            height: 12px;
            float: left;
            margin-right: 8px;
            margin-top: 3px;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <header>
        <h2>Global Hydrocarbon Systems</h2>
        <div>
            <label for="csvFileInput" style="margin-right: 10px;">Load CSV Database:</label>
            <input type="file" id="csvFileInput" accept=".csv" />
        </div>
    </header>

    <div class="main-container">
        <div id="map"></div>
        <div id="side-panel">
            <div class="panel-placeholder">
                <h3>Welcome!</h3>
                <p>1. Load your CSV file using the button above.</p>
                <p>2. Hover over any point on the map to see the detailed geological and production data here.</p>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        // Initialize Map
        const map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 10
        }).addTo(map);

        // Define a color palette for the classification systems
        const systemColors = {
            'CL-D': '#2980b9', // Deep blue
            'CL-T': '#16a085', // Teal
            'C-S': '#f39c12',  // Orange
            'CL-A': '#8e44ad', // Purple
            'H-D': '#e84393',  // Pink
            'CL-S': '#27ae60', // Green
            'CL-U': '#f1c40f', // Yellow
            'C-R': '#c0392b',  // Red
            'U-B': '#8b4513',  // Brown
            'H-F': '#d35400',  // Dark Orange
            'U-C': '#7f8c8d',  // Gray
            'C-P': '#800000',  // Maroon
            'M': '#2c3e50',    // Dark Navy
            'Default': '#95a5a6'
        };

        // Add Legend
        const legend = L.control({position: 'bottomleft'});
        legend.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'info legend');
            div.innerHTML = '<strong>System Classification</strong><br>';
            for (let key in systemColors) {
                if(key !== 'Default') {
                    div.innerHTML += `<i style="background:${systemColors[key]}"></i> ${key.split(' ')[0]}<br>`;
                }
            }
            return div;
        };
        legend.addTo(map);

        let markersLayer = L.layerGroup().addTo(map);

        // Handle File Upload
        document.getElementById('csvFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            Papa.parse(file, {
                header: true,
                dynamicTyping: true,
                skipEmptyLines: true,
                complete: function(results) {
                    plotData(results.data);
                }
            });
        });

        function plotData(data) {
            markersLayer.clearLayers();

            data.forEach(row => {
                const lat = parseFloat(row['Latitude']);
                const lng = parseFloat(row['Longitude']);

                // Skip rows without valid coordinates
                if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;
// Determine color based on System Classification Code
                let sysCode = row['System Classification Code'] || '';
                let colorKey = 'Default';
                for (let key in systemColors) {
                    if (sysCode.startsWith(key)) {
                        colorKey = key;
                        break;
                    }
                }
                const pointColor = systemColors[colorKey];

                // Create circle marker
                const marker = L.circleMarker([lat, lng], {
                    radius: 6,
                    fillColor: pointColor,
                    color: '#fff',
                    weight: 1,
                    opacity: 1,
                    fillOpacity: 0.8
                });

                // Add Hover Event
                marker.on('mouseover', function() {
                    updateSidePanel(row, pointColor);
                });

                markersLayer.addLayer(marker);
            });
            
            // Auto-fit map to show all points
            if (markersLayer.getLayers().length > 0) {
                let group = new L.featureGroup(markersLayer.getLayers());
                map.fitBounds(group.getBounds().pad(0.1));
            }
        }

        function updateSidePanel(row, color) {
            const panel = document.getElementById('side-panel');
            
            // Helper functions to safely render data
            const isMissing = (val) => (
                val === null || val === undefined || val === '' ||
                (typeof val === 'number' && isNaN(val))
            );
            const safeStr = (val) => isMissing(val) ? 'N/A' : String(val);
            
            const sysCode = safeStr(row['System Classification Code']);

            // New split EUR fields (with backwards-compatible fallback)
            const eurOil = row['Estimated Reservoir Size / EUR (Oil)'];
            const eurGas = row['Estimated Reservoir Size / EUR (Gas)'];
            const eurLegacy = row['Estimated Reservoir Size / EUR'];
            const showLegacyEUR = isMissing(eurOil) && isMissing(eurGas) && !isMissing(eurLegacy);

            let html = `
                <h2 style="margin-top:0; color:#2c3e50;">${safeStr(row['Field Name'])}</h2>
                <div class="tag" style="background-color: ${color};">${sysCode}</div>
                <hr style="border:0; border-top:1px solid #ddd; margin: 15px 0;">
                
                <div class="info-group">
                    <div class="info-label">Location</div>
                    <div class="info-value">${safeStr(row['Country/Region'])} (${safeStr(row['Onshore/Offshore'])})</div>
                </div>

                <div class="info-group">
                    <div class="info-label">Operator & Status</div>
                    <div class="info-value">${safeStr(row['Operator'])} | ${safeStr(row['Status'])}</div>
                </div>

                <div class="info-group">
                    <div class="info-label">Estimated Reservoir Size / EUR</div>
                    <div class="info-value">
                        <div><b>Oil:</b> ${safeStr(eurOil)}</div>
                        <div><b>Gas:</b> ${safeStr(eurGas)}</div>
                        ${showLegacyEUR ? `<div style="margin-top:6px;"><b>Legacy:</b> ${safeStr(eurLegacy)}</div>` : ''}
                    </div>
                </div>

                <div class="info-group">
                    <div class="info-label">Geological Architecture</div>
                    <div class="info-value">
                        <ul>
                            <li><b>Trap:</b> ${safeStr(row['Trap Type Classification'])}</li>
                            <li><b>Reservoir:</b> ${safeStr(row['Reservoir Rock Type'])}</li>
                            <li><b>Caprock:</b> ${safeStr(row['Caprock Type'])}</li>
                        </ul>
                    </div>
                </div>

                <div class="info-group">
                    <div class="info-label">Description</div>
                    <div class="info-value"><i>${safeStr(row['Description'])}</i></div>
                </div>

                <div class="info-group">
                    <div class="info-label">Sources</div>
                    <div class="info-value" style="font-size: 0.85em; word-wrap: break-word;">${safeStr(row['Sources'])}</div>
                </div>
            `;
            
            panel.innerHTML = html;
        }
    </script>
</body>
</html>
